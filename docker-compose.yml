services:
  db:
    image: mysql:8.4
    container_name: estacionamiento_db
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-estacionamiento}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Configura MYSQL_ROOT_PASSWORD en .env}
    ports:
      - "3306:3306"
    volumes:
      - estacionamiento_mysqldata:/var/lib/mysql

volumes:
  estacionamiento_mysqldata:
